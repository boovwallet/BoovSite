  <text x="588" y="205" fill="#3b466a" font-family="Space Grotesk, Arial, sans-serif" font-size="10.5" letter-spacing="1.25" text-anchor="end">FOR ESSENTIAL USE</text>
  <text x="588" y="226" fill="#3b466a" font-family="Space Grotesk, Arial, sans-serif" font-size="10.5" letter-spacing="1.25" text-anchor="end">NO CASH WITHDRAWAL</text>
