  <text x="42" y="119" fill="#8a8fa0" font-family="Space Grotesk, Arial, sans-serif" font-size="7" letter-spacing="1.4">AUTHORIZED SIGNATURE</text>
  <rect x="541" y="105" width="40" height="20" rx="2" fill="#fff" stroke="#101a36" stroke-opacity="0.18"/>
