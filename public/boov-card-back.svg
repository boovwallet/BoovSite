    <pattern id="qr-data" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M0 0h4v4H0zM8 0h4v8H8zM4 4h4v4H4zM0 8h8v4H0z" fill="#101a36"/>
    </pattern>
  </defs>

  <rect width="620" height="391" rx="26" fill="url(#card-bg)"/>
