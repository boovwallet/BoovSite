<svg xmlns="http://www.w3.org/2000/svg" width="620" height="391" viewBox="0 0 620 391" role="img" aria-label="Back of Boov Essentials card">
  <defs>
    <radialGradient id="card-bg" cx="80%" cy="0%" r="130%">
      <stop offset="0" stop-color="#e6dffb"/>
      <stop offset="0.48" stop-color="#ddd4f7"/>
      <stop offset="1" stop-color="#cfc4ef"/>
    </radialGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1730"/>
      <stop offset="0.55" stop-color="#081127"/>
      <stop offset="1" stop-color="#0d1730"/>
    </linearGradient>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
